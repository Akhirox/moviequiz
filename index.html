<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="glow-title">🎬 Movie Quiz</h1>
        <p class="subtitle">Cherche un film ou laisse le hasard décider !</p>

        <div id="homeMenu" class="search-container">
            <input type="text" id="searchInput" placeholder="Titre du film (ex: Matrix)..." autocomplete="off">
            <ul id="searchResults" class="results-list hidden"></ul>
            
            <div class="divider">ou</div>
            
            <div class="random-section">
                <p>Tire un film au hasard selon la difficulté :</p>
                <div class="difficulty-buttons">
                    <button id="btn-easy" class="btn-diff btn-easy">🟢 Facile</button>
                    <button id="btn-normal" class="btn-diff btn-normal">🟡 Normal</button>
                    <button id="btn-hard" class="btn-diff btn-hard">🟠 Difficile</button>
                    <button id="btn-extreme" class="btn-diff btn-extreme">🔴 Extrême</button>
                </div>
            </div>
        </div>

        <div id="quizContainer" class="hidden">
            <div class="movie-header">
                <img id="moviePoster" src="" alt="Affiche du film" onerror="this.onerror=null; this.src='https://placehold.co/300x450/1a1a1a/ff8c00?text=Affiche+Introuvable'">
                <h2 id="movieTitle" class="glow-text">Titre du film</h2>
            </div>
            
            <div id="questionArea">
                <div class="input-group">
                    <label>Réalisateur(s) :</label>
                    <input type="text" id="ans-director" placeholder="Nom du réalisateur..." autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label>Année de sortie :</label>
                    <input type="number" id="ans-year" placeholder="Ex: 1999" autocomplete="off">
                </div>

                <div class="input-group" id="budgetGroup">
                    <label>Budget (en $) : <span style="font-size: 0.8em; color: #aaa;">(10% d'erreur autorisé)</span></label>
                    <input type="number" id="ans-budget" placeholder="Ex: 63000000" autocomplete="off">
                </div>

                <div class="input-group">
                    <label>Acteurs (+1 pt par bonne réponse, -1 pt par erreur) :</label>
                    <input type="text" id="ans-actor" placeholder="Tape un nom et appuie sur Entrée..." autocomplete="off">
                    <div id="actorTags" class="tags-container"></div>
                </div>

                <button id="validateBtn" class="btn-orange mt-20">✅ Valider mes réponses</button>
                
                <div id="resultArea" class="hidden">
                    <h3 id="scoreText" class="glow-title" style="font-size: 2em;"></h3>
                    <div id="correctionArea"></div>
                </div>
            </div>
            
            <button id="nextBtn" class="btn-orange hidden mt-20">Rejouer un film</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
